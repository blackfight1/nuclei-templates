id: crlf-injection-low-fp

info:
  name: CRLF Injection Detection (Low False Positive)
  author: coffin,codex
  severity: high
  description: |
    Detects CRLF injection by comparing a benign baseline request with an
    injected request and only reporting when the injected response adds a new
    standalone Set-Cookie, Location, or custom response header containing a
    per-scan random marker.
  reference:
    - https://book.hacktricks.xyz/pentesting-web/crlf-0d-0a
    - https://docs.projectdiscovery.io/templates/reference/variables
    - https://docs.projectdiscovery.io/templates/reference/helper-functions
  metadata:
    max-request: 16
    verified: true
  tags: crlf,header-injection,response-splitting

variables:
  marker: "{{to_lower(rand_base(8))}}"
  cookie_name: "crlf{{marker}}"
  cookie_value: "{{marker}}"
  redirect_host: "{{marker}}.example"
  header_name: "x-crlf-{{marker}}"
  header_value: "{{marker}}"

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}
        Connection: close

      - |
        GET /%0D%0ASet-Cookie:%20{{cookie_name}}={{cookie_value}};%20Path=/ HTTP/1.1
        Host: {{Hostname}}
        Connection: close
    req-condition: true
    redirects: false
    cookie-reuse: false
    stop-at-first-match: false
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "status_code_2 >= 200"
          - "status_code_2 < 400"
          - "!contains(concat('\n', to_lower(all_headers_1)), concat('\nset-cookie: ', to_lower(cookie_name), '=', to_lower(cookie_value)))"
          - "contains(concat('\n', to_lower(all_headers_2)), concat('\nset-cookie: ', to_lower(cookie_name), '=', to_lower(cookie_value)))"
    extractors:
      - type: dsl
        dsl:
          - "cookie_name"
          - "cookie_value"

  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}
        Connection: close

      - |
        GET /%0ASet-Cookie:%20{{cookie_name}}={{cookie_value}};%20Path=/ HTTP/1.1
        Host: {{Hostname}}
        Connection: close
    req-condition: true
    redirects: false
    cookie-reuse: false
    stop-at-first-match: false
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "status_code_2 >= 200"
          - "status_code_2 < 400"
          - "!contains(concat('\n', to_lower(all_headers_1)), concat('\nset-cookie: ', to_lower(cookie_name), '=', to_lower(cookie_value)))"
          - "contains(concat('\n', to_lower(all_headers_2)), concat('\nset-cookie: ', to_lower(cookie_name), '=', to_lower(cookie_value)))"
    extractors:
      - type: dsl
        dsl:
          - "cookie_name"
          - "cookie_value"

  - raw:
