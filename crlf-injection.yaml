          - "!contains(concat('\n', to_lower(all_headers_1)), concat('\nlocation: https://', to_lower(redirect_host), '/'))"
          - "contains(concat('\n', to_lower(all_headers_2)), concat('\nlocation: https://', to_lower(redirect_host), '/'))"
