id: http-put-delete-multi-url

info:
  name: HTTP PUT & DELETE Enabled (Multi-URL)
  author: iman
  severity: high
  description: |
    Detects HTTP PUT and DELETE methods enabled on multiple URLs.
    Attempts to upload a random file via PUT, verify via GET if possible,
    and then remove it using DELETE.
  reference:
    - https://portswigger.net/kb/issues/00100900_http-put-method-is-enabled
  metadata:
    max-request: 3
  tags: intrusive,misconfig,put,delete,webdav

variables:
  filename: "{{randstr}}.txt"

http:
  - raw:
      # 1️⃣ PUT – 尝试写入
      - |
        PUT {{BasePath}}/{{filename}} HTTP/1.1
        Host: {{Hostname}}
        Content-Type: text/plain

        {{randstr}}

      # 2️⃣ GET – 尝试读取（不强制要求成功）
      - |
        GET {{BasePath}}/{{filename}} HTTP/1.1
        Host: {{Hostname}}

      # 3️⃣ DELETE – 尝试删除
      - |
        DELETE {{BasePath}}/{{filename}} HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: or
    matchers:
      # PUT 写入成功（不要求 GET）
      - type: dsl
        name: put-enabled
        dsl:
          - 'status_code_1 in [200,201,204]'

      # PUT + GET 可读（最高危）
      - type: dsl
        name: put-readable
        dsl:
          - 'status_code_1 in [200,201,204]'
          - 'contains(body_2, "{{randstr}}")'

      # DELETE 成功
      - type: dsl
        name: delete-enabled
        dsl:
          - 'status_code_3 in [200,202,204]'
